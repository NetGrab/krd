<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Saver - دابەزێنەری تیکتۆک</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --bg-dark: #000000; /* گۆڕدرا بۆ ڕەشی تەواو */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            direction: rtl;
        }

        #fireflies {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 15% 25%, rgba(255, 0, 80, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 85% 75%, rgba(0, 242, 234, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 95%;
            max-width: 500px;
            text-align: center;
            padding: 40px 10px;
            z-index: 1;
        }

        .logo-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        
        .logo-link:active {
            transform: scale(0.95);
        }

        header h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            background: linear-gradient(to right, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .logo-area {
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .kurdish-flag {
            width: 40px; height: 25px;
            background: linear-gradient(to bottom, #ee2d24 33.3%, #ffffff 33.3%, #ffffff 66.6%, #3d9e48 66.6%);
            position: relative; border-radius: 3px;
        }

        .sun {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 12px; height: 12px; background: #fcc201; border-radius: 50%;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
        }

        .input-wrapper { position: relative; margin-bottom: 15px; }

        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 16px; padding-left: 80px; border-radius: 15px;
            color: white; font-size: 1rem; outline: none; box-sizing: border-box; text-align: right;
        }

        .paste-btn {
            position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border);
            color: var(--secondary); padding: 6px 12px; border-radius: 10px; cursor: pointer;
            font-size: 0.8rem;
        }

        #fetchBtn {
            width: 100%; background: linear-gradient(45deg, var(--primary), #ff4d8d);
            color: white; border: none; padding: 16px; border-radius: 15px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        #result { margin-top: 20px; }
        #videoThumb { width: 100%; border-radius: 15px; border: 1px solid var(--glass-border); margin-bottom: 10px; }

        .download-btn {
            width: 100%; background: #2563eb; color: white; border: none;
            padding: 18px; border-radius: 50px; font-weight: bold;
            margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        footer { padding: 20px 0; opacity: 0.5; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="fireflies"></canvas>

    <div class="container">
        <header>
            <a href="javascript:location.reload();" class="logo-link">
                <div class="logo-area">
                    <div class="kurdish-flag"><div class="sun"></div></div>
                    <h1>Kurdish Saver</h1>
                </div>
            </a>
            <p style="margin-bottom: 25px; color: #94a3b8; font-size: 0.9rem;">دابەزاندنی ڤیدیۆی تیکتۆک بە کوالێتی بەرز</p>
        </header>

        <main class="glass-card">
            <div class="input-wrapper">
                <input type="text" id="urlInput" placeholder="لینک لێرە دابنێ...">
                <button class="paste-btn" onclick="pasteLink()">
                    <i class="fas fa-paste"></i> لکاندن
                </button>
            </div>
            
            <button onclick="fetchVideo()" id="fetchBtn">
                <i class="fas fa-magic"></i> وەرگرتنی ڤیدیۆ
            </button>

            <div id="loader" class="loader hidden" style="margin: 20px 0;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--secondary);"></i>
            </div>

            <div id="result" class="hidden">
                <img id="videoThumb" src="" alt="Thumbnail">
                <p id="videoTitle" style="font-size: 0.85rem; color: #cbd5e1; line-height: 1.4; margin-bottom: 10px;"></p>
                
                <button onclick="downloadVideo()" id="dlBtn" class="download-btn">
                    <i class="fas fa-download"></i> پاشکەوتکردن (Gallery)
                </button>
            </div>
        </main>

        <footer>
            <p>NetGrab &copy; 2026</p>
        </footer>
    </div>

    <script>
        /* Fireflies Animation */
        const canvas = document.getElementById('fireflies');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.8 + 0.1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random();
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 150, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        /* Logic */
        let finalVideoUrl = "";

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
            } catch (err) { alert("تکایە ڕێگە بدە بە Clipboard"); }
        }

        async function fetchVideo() {
            const url = document.getElementById('urlInput').value;
            if (!url) return;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await res.json();
                if (json.code === 0) {
                    // لێرەدا کوالێتی HD جێگیر کراوە
                    finalVideoUrl = json.data.hdplay || json.data.play;
                    document.getElementById('videoThumb').src = json.data.cover;
                    document.getElementById('videoTitle').innerText = json.data.title || "ڤیدیۆکە ئامادەیە";
                    document.getElementById('result').classList.remove('hidden');
                } else { alert("لینکەکە هەڵەیە"); }
            } catch (e) { alert("کێشەیەک ڕوویدا"); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        async function downloadVideo() {
            const dlBtn = document.getElementById('dlBtn');
            const originalContent = dlBtn.innerHTML;
            try {
                dlBtn.disabled = true;
                dlBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> چاوەڕێبە...';
                const response = await fetch(finalVideoUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = `KurdishSaver_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    window.URL.revokeObjectURL(blobUrl);
                    document.body.removeChild(a);
                }, 100);
            } catch (error) {
                window.location.href = finalVideoUrl;
            } finally {
                dlBtn.disabled = false;
                dlBtn.innerHTML = originalContent;
            }
        }
    </script>
</body>
</html>
