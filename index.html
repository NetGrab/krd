<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Saver - Professional TikTok Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* بەشی دیزاین - CSS */
        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* باکگراوندە ڕەنگاوڕەنگەکە */
        .background-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 25%, rgba(255, 0, 80, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 85% 75%, rgba(0, 242, 234, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 95%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            background: linear-gradient(to right, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* ئاڵای کوردستان */
        .kurdish-flag {
            width: 40px; height: 25px;
            background: linear-gradient(to bottom, #ee2d24 33.3%, #ffffff 33.3%, #ffffff 66.6%, #3d9e48 66.6%);
            position: relative; border-radius: 3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .sun {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px; background: #fcc201;
            border-radius: 50%;
        }

        .sun::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 15px; height: 15px;
            background: repeating-conic-gradient(from 0deg, #fcc201 0deg 17deg, transparent 17deg 34deg);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        /* کارتە شووشەییەکە */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.2);
        }

        #fetchBtn {
            background: linear-gradient(45deg, var(--primary), #ff4d8d);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        #fetchBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3);
        }

        /* نیشاندەر و ئەنجام */
        .loader { margin: 20px 0; color: var(--secondary); }
        
        .result-card {
            margin-top: 25px;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #videoThumb {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid var(--glass-border);
        }

        .download-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .download-btn:hover { background: #1d4ed8; }

        footer { margin-top: 40px; opacity: 0.6; font-size: 0.8rem; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="background-blobs"></div>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="kurdish-flag"><div class="sun"></div></div>
                <h1>Kurdish Saver</h1>
            </div>
            <p style="margin-bottom: 30px; color: #94a3b8;">High Quality Video Downloader</p>
        </header>

        <main class="glass-card">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste TikTok video link here...">
                <button onclick="fetchVideo()" id="fetchBtn">
                    <i class="fas fa-magic"></i> Get Video
                </button>
            </div>

            <div id="loader" class="loader hidden">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 10px;">Searching for video...</p>
            </div>

            <div id="result" class="result-card hidden">
                <img id="videoThumb" src="" alt="Thumbnail">
                <p id="videoTitle" style="margin: 15px 0; font-size: 0.9rem; color: #cbd5e1;"></p>
                
                <button onclick="downloadDirectly()" id="dlBtn" class="download-btn">
                    <i class="fas fa-download"></i> Save to Device
                </button>
            </div>
        </main>

        <footer>
            <p>Powered by Kurdish Saver Technology &copy; 2026</p>
        </footer>
    </div>

    <script>
        /* بەشی فرمانەکان - JavaScript */
        let videoDownloadUrl = "";

        async function fetchVideo() {
            const urlInput = document.getElementById('urlInput');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            const fetchBtn = document.getElementById('fetchBtn');

            if (!urlInput.value.trim()) {
                alert("تکایە لینکەکە لێرە دابنێ");
                return;
            }

            // ئامادەکردنی ڕووکار
            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            fetchBtn.disabled = true;
            fetchBtn.style.opacity = "0.7";

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput.value)}`);
                const data = await response.json();

                if (data.code === 0) {
                    videoDownloadUrl = data.data.play;
                    document.getElementById('videoThumb').src = data.data.cover;
                    document.getElementById('videoTitle').innerText = data.data.title || "TikTok Video Ready";
                    
                    loader.classList.add('hidden');
                    resultDiv.classList.remove('hidden');
                } else {
                    alert("لینکەکە هەڵەیە یان ڤیدیۆکە سڕاوەتەوە");
                    loader.classList.add('hidden');
                }
            } catch (error) {
                alert("کێشەیەک لە پەیوەندی دروستبوو، تکایە دووبارە هەوڵ بدەرەوە");
                loader.classList.add('hidden');
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.style.opacity = "1";
            }
        }

        async function downloadDirectly() {
            const dlBtn = document.getElementById('dlBtn');
            const originalText = dlBtn.innerHTML;
            
            try {
                dlBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Downloading...';
                dlBtn.disabled = true;

                const res = await fetch(videoDownloadUrl);
                const blob = await res.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = `KurdishSaver_${Date.now()}.mp4`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                // ئەگەر دابەزاندنی Blob کاری نەکرد، لینکەکە ڕاستەوخۆ دەکاتەوە
                window.open(videoDownloadUrl, '_blank');
            } finally {
                dlBtn.innerHTML = originalText;
                dlBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
