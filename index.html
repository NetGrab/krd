<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdish Saver - دابەزێنەری تیکتۆک</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            direction: rtl; /* گۆڕینی ئاڕاستە بۆ کوردی */
        }

        .background-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 25%, rgba(255, 0, 80, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 85% 75%, rgba(0, 242, 234, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 95%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            background: linear-gradient(to right, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .kurdish-flag {
            width: 40px; height: 25px;
            background: linear-gradient(to bottom, #ee2d24 33.3%, #ffffff 33.3%, #ffffff 66.6%, #3d9e48 66.6%);
            position: relative; border-radius: 3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .sun {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px; background: #fcc201;
            border-radius: 50%;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 18px;
            padding-left: 80px; /* جێگا بۆ دوگمەی پەیست */
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            text-align: right;
        }

        input:focus {
            border-color: var(--primary);
        }

        .paste-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--secondary);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .paste-btn:hover {
            background: var(--secondary);
            color: black;
        }

        #fetchBtn {
            width: 100%;
            background: linear-gradient(45deg, var(--primary), #ff4d8d);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        #fetchBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 0, 80, 0.3);
        }

        .loader { margin: 20px 0; color: var(--secondary); }
        
        .result-card {
            margin-top: 25px;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #videoThumb {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid var(--glass-border);
        }

        .download-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        footer { margin-top: 40px; opacity: 0.6; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="background-blobs"></div>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="kurdish-flag"><div class="sun"></div></div>
                <h1>Kurdish Saver</h1>
            </div>
            <p style="margin-bottom: 30px; color: #94a3b8;">دابەزاندنی ڤیدیۆی تیکتۆک بە کوالیتی بەرز</p>
        </header>

        <main class="glass-card">
            <div class="input-wrapper">
                <input type="text" id="urlInput" placeholder="لینک لێرە دابنێ...">
                <button class="paste-btn" onclick="pasteLink()">
                    <i class="fas fa-paste"></i> لکاندن
                </button>
            </div>
            
            <button onclick="fetchVideo()" id="fetchBtn">
                <i class="fas fa-magic"></i> وەرگرتنی ڤیدیۆ
            </button>

            <div id="loader" class="loader hidden">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 10px;">بوەستە... ڤیدیۆکە دەدۆزرێتەوە</p>
            </div>

            <div id="result" class="result-card hidden">
                <img id="videoThumb" src="" alt="وێنەی ڤیدیۆ">
                <p id="videoTitle" style="margin: 15px 0; font-size: 0.9rem; color: #cbd5e1;"></p>
                
                <button onclick="downloadDirectly()" id="dlBtn" class="download-btn">
                    <i class="fas fa-download"></i> پاشکەوتکردن لە ئامێرەکەدا
                </button>
            </div>
        </main>

        <footer>
            <p>گەشەپێدراوە لەلایەن Kurdish Saver &copy; 2026</p>
        </footer>
    </div>

    <script>
        let videoDownloadUrl = "";

        // فرمانی پەیست کردنی لینکەکە
        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('urlInput').value = text;
            } catch (err) {
                alert("تکایە ڕێگە بدە بە وەرگرتنی نووسین (Clipboard)");
            }
        }

        async function fetchVideo() {
            const urlInput = document.getElementById('urlInput');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            const fetchBtn = document.getElementById('fetchBtn');

            if (!urlInput.value.trim()) {
                alert("تکایە سەرەتا لینکێک دابنێ");
                return;
            }

            loader.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            fetchBtn.disabled = true;

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput.value)}`);
                const data = await response.json();

                if (data.code === 0) {
                    videoDownloadUrl = data.data.play;
                    document.getElementById('videoThumb').src = data.data.cover;
                    document.getElementById('videoTitle').innerText = data.data.title || "ڤیدیۆکە ئامادەیە بۆ دابەزاندن";
                    
                    loader.classList.add('hidden');
                    resultDiv.classList.remove('hidden');
                } else {
                    alert("لینکەکە هەڵەیە یان ڤیدیۆکە بەردەست نییە");
                    loader.classList.add('hidden');
                }
            } catch (error) {
                alert("کێشەیەک لە هێڵدا هەیە، دووبارە هەوڵ بدەرەوە");
                loader.classList.add('hidden');
            } finally {
                fetchBtn.disabled = false;
            }
        }

        async function downloadDirectly() {
            const dlBtn = document.getElementById('dlBtn');
            const originalText = dlBtn.innerHTML;
            
            try {
                dlBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> چاوەڕێبە...';
                dlBtn.disabled = true;

                const res = await fetch(videoDownloadUrl);
                const blob = await res.blob();
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = `KurdishSaver_${Date.now()}.mp4`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                window.open(videoDownloadUrl, '_blank');
            } finally {
                dlBtn.innerHTML = originalText;
                dlBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
